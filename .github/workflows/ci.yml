name: CI pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run lint
        run: npm run lint
        working-directory: ./backend

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: postgresql://medicore:medicore123@localhost:5432/medicore_test
      REDIS_URL: redis://localhost:6379

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medicore_test
          POSTGRES_USER: medicore
          POSTGRES_PASSWORD: medicore123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: 
          - 6379:6379

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run tests
        run: npm test
        working-directory: ./backend

  security-scan:

    runs-on: ubuntu-latest
    needs: lint
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build api image
        run: docker build -t medicore-api:latest ./backend

      - name: Build frontend image
        run: docker build -t medicore-frontend:latest ./frontend/      

      - name: Scan api image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: medicore-api:latest
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Scan frontend image     
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: medicore-frontend:latest
          severity: HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore
      
  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, test-backend, security-scan]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push api image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPO_API }}:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPO_API }}:$IMAGE_TAG

      - name: Build and push frontend image
        env:  
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPO_FRONTEND }}:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPO_FRONTEND }}:$IMAGE_TAG
